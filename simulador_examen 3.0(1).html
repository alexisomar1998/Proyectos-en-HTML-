            {q: "69. ¿De acuerdo con Carlos Nino, el positivismo metodológico postula que los derechos subjetivos?:", opts: ["a. No existen en el plano de la realidad.", "b. Son derechos jurídicos plenos.", "c. Existen en el plano de la moral.", "d. Afectan negativamente la justificabilidad moral del sistema."], a: 2},
            {q: "70. ¿Qué tipo de indeterminación lingüística correspondería asignar a los conceptos “enojo” y “maldad” en la siguiente frase: “No es fácil saber cuándo estás actuando por enojo y cuándo por pura maldad”?", opts: ["a. Laguna.", "b. Ambigüedad.", "c. Falta de determinación.", "d. Vaguedad."], a: 3},

            {q: "72. ¿A qué corriente de interpretación constitucional anglosajona se ajustaría más el voto salvado del juez presidente Salgado en las sentencias 10-18-CN/19 (matrimonio de personas del mismo sexo) y 11-18-CN/19 (matrimonio igualitario)?", opts: ["a. Lógica.", "b. Telemática.", "c. Exegética.", "d. Originalista."], a: 3},
            {q: "73. ¿Para Jacques Lacan, la noción de “puntada” se refiere a?", opts: ["a. La asignación retroactiva de significado a los significantes del encadenamiento de signos.", "b. La asignación ultractiva de significantes a los significados de del encadenamiento de signos.", "c. La develación retroactiva del significado a los significantes del encadenamiento de signos.", "d. La asignación ultractiva de significados a los significantes del encadenamiento de signos."], a: 0},
            {q: "74. ¿A qué tipo de definición corresponde la siguiente: “Para efectos del presente contrato, las partes entenderán por ‘precio’ el valor que se pagará a modo de contraprestación por el servicio prestado, sin incluir recargos por retraso en el pago”?", opts: ["a. Contextual.", "b. Lexicográfica.", "c. Ostensiva.", "d. Estipulativa."], a: 3},
            {q: "75. ¿Qué subprincipio del test de proporcionalidad hace referencia a una adecuación entre medios y fines?", opts: ["a. Proporcionalidad en sentido amplio", "b. Proporcionalidad en sentido estricto", "c. Idoneidad", "d. Necesidad"], a: 2},
            {q: "76. ¿Qué implica reconstruir un precedente?", opts: ["a. Implica crear un nuevo precedente donde antes no existía uno.", "b. Implica deshacerse de un precedente que resulta injusto o inconveniente.", "c. Implica reconocer que una decisión anterior contiene un precedente y reformularlo como una regla.", "d. Implica reconocer que no existe un precedente y que en el futuro deberá establecérselo."], a: 2},

            {q: "79. ¿En qué casos un juez puede abstenerse de resolver una causa puesta en su conocimiento, por falta de norma jurídica?", opts: ["a. En ningún caso.", "b. Cuando sea alegado por una de las partes", "c. Cuando sea alegado por ambas partes", "d. Cuando lo ordene su superior"], a: 0},

            {q: "84. ¿Los jueces de la Corte Constitucional, son regulados administrativamente por?", opts: ["a. Ninguna de las otras opciones.", "b. Consejo de la Judicatura", "c. Asamblea Nacional", "d. Corte Nacional de Justicia"], a: 0},
            {q: "85. ¿La Corte Constitucional es un órgano que se encuentra dentro de?", opts: ["a. Ninguna de las otras opciones.", "b. Función judicial", "c. Función ejecutiva", "d. Función legislativa", "e. Función de transparencia y control social"], a: 0},

            {q: "96. ¿Las acciones de garantías jurisdiccionales pueden?", opts: ["a. Estar o no acompañadas de solicitud de medidas cautelares.", "b. Siempre ir acompañadas de solicitud de medidas cautelares", "c. Justificar que se ha presentado medidas cautelares independientes antes otro juzgador", "d. Ninguna de las otras opciones"], a: 0},

            {q: "98. ¿La acción extraordinaria de protección es conocida por?", opts: ["a. La Corte Constitucional.", "b. La Corte Provincial", "c. La Corte Nacional de Justicia", "d. Ninguna de las otras opciones"], a: 0},
            {q: "99. ¿La acción de incumplimiento es una garantía jurisdiccional?", opts: ["a. No", "b. Si.", "c. En algunas ocasiones", "d. Desconozco"], a: 1},
            {q: "100. ¿Quién puede beneficiarse de las medidas de reparación?", opts: ["a. La Víctima.", "b. El legitimado activo", "c. El legitimado pasivo", "d. Todos"], a: 0},
            {q: "101. ¿La acción de incumplimiento protege uno de los componentes fundamentales del derecho a la tutela judicial efectiva, que es?", opts: ["a. Ejecución de la decisión.", "b. Acceso a la justicia", "c. Debido proceso", "d. Seguridad jurídica"], a: 0},
            {q: "102. ¿Qué puede hacer un juez que no participó en las decisiones previas que establecen precedentes obligatorios?", opts: ["a. Está obligado a seguir el precedente, incluso si no participó en su formación.", "b. Puede emitir un voto concurrente o salvado, pues no está vinculado por ese precedente.", "c. Solo puede apartarse del precedente si todos los demás jueces también lo hacen.", "d. Puede ignorar el precedente y dictar una decisión totalmente independiente sin justificarla."], a: 1},
            {q: "103. ¿Cuál es el plazo que tiene la jueza o juez para remitir el expediente y el informe a la Corte Constitucional?", opts: ["a. Cinco días desde que se dictó la sentencia", "b. Cinco días desde que el interesado hizo la solicitud", "c. Cinco días desde que se ejecutorió la sentencia.", "d. No tiene un plazo establecido, solamente es un plazo razonable"], a: 1},
            {q: "104. ¿Cuánto tiempo tiene el afectado para solicitar a la Corte Constitucional que ordene a la jueza o juez la remisión del expediente y declare el incumplimiento de la sentencia, cuando el juez no cumple con el plazo?", opts: ["a. Dentro de cinco días siguientes al vencimiento del plazo", "b. Dentro de diez días siguientes al vencimiento del término de 5 días.", "c. Dentro de quince días siguientes al vencimiento del término de 10 días", "d. No existe un tiempo límite para esta solicitud"], a: 1},
            {q: "105. ¿Qué requisito adicional debe cumplirse para que los fallos de triple reiteración de la Corte Nacional de Justicia tengan carácter de jurisprudencia obligatoria?", opts: ["a. Que el Presidente de la Corte Nacional de Justicia lo apruebe", "b. Que el pleno de la Corte Nacional de Justicia pronuncie conforme el precedente.", "c. Que el precedente sea publicado en el Registro Oficial", "d. Que el precedente sea revisado por la Corte Constitucional"], a: 1},
            {q: "106. ¿Qué ocurre si hay más de tres sentencias que respaldan un criterio de jurisprudencia obligatoria de la Corte Nacional de Justicia y una de ellas es dejada sin efecto por la Corte Constitucional?", opts: ["a. El criterio pierde automáticamente su carácter obligatorio", "b. Se debe emitir una nueva sentencia para confirmar el criterio", "c. El criterio se mantiene como obligatorio.", "d. El criterio queda sin efecto temporalmente hasta que se resuelva la situación"], a: 2},
            {q: "107. ¿Qué sucede si la Corte Constitucional deja sin efecto una de las tres únicas sentencias que conforman un fallo de triple reiteración de la Corte Nacional de Justicia?", opts: ["a. El criterio sigue siendo jurisprudencia vinculante sin necesidad de más acciones.", "b. Ya no se cumple el requisito constitucional para que ese criterio sea jurisprudencia vinculante.", "c. La Corte Nacional de Justicia debe esperar a que la Corte Constitucional emita un nuevo fallo para actuar.", "d. La Corte Nacional de Justicia debe ratificar el criterio sin cambios"], a: 1},
            {q: "108. ¿Cuándo se considera que un argumento es claro, relacionado con la inobservancia de precedentes constitucionales presentado en una acción extraordinaria de protección?", opts: ["a. Cuando el accionante menciona el número de sentencia que contiene el precedente.", "b. Cuando el accionante reúne la tesis, base fáctica y justificación jurídica, incluyendo la identificación de la regla de precedente y la exposición de su aplicabilidad al caso.", "c. Cuando el accionante presenta únicamente la tesis, base fáctica y justificación jurídica.", "d. Cuando el accionante expone únicamente la tesis y justificación jurídica incluyendo la identificación de la regla de precedente y la exposición de su aplicabilidad al caso."], a: 1},
            {q: "109. ¿Qué carácter tiene la acción de incumplimiento en caso de que una sentencia constitucional no sea ejecutada o se ejecute de manera defectuosa?", opts: ["a. Principal y obligatoria", "b. Subsidiaria y excepcional.", "c. Informativa y consultiva", "d. Subsidiaria y sancionatoria"], a: 1},
            {q: "110. ¿Qué es la 'ratio decidendi' en el contexto de la formación de un precedente?", opts: ["a. La opinión minoritaria que acompaña la sentencia", "b. La razón esencial que justifica la decisión principal.", "c. La razón adicional que justifica la decisión principal", "d. La razón externa que no afecta la decisión"], a: 1},
            {q: "111. ¿Qué ocurre cuando, debido a la existencia de votos particulares, no se alcanzan cinco votos totalmente afirmativos en una decisión de la Corte Constitucional para que esta se configure como precedente en sentido estricto?", opts: ["a. Se considera precedente si, al leer la sentencia y los votos particulares, se identifican al menos cinco votos a favor de la ratio decidendi.", "b. Se necesita una nueva votación para alcanzar cinco votos afirmativos", "c. Se descarta la decisión como precedente automáticamente", "d. La decisión se mantiene como precedente solo si el presidente de la Corte Constitucional, con voto dirimente, señala que la decisión contiene un precedente"], a: 0},
            {q: "112. ¿Qué característica debe tener todo precedente judicial en sentido estricto o regla de precedente?", opts: ["a. Debe ser elaborada interpretativamente por el decisor, utilizando solamente la literalidad del texto normativo.", "b. Debe ser elaborada interpretativamente por el decisor, no simplemente tomada del derecho preexistente.", "c. Debe ser elaborada interpretativamente por el decisor, a partir de costumbre y doctrina, ignorando el texto normativo.", "d. Debe ser elaborada interpretativamente por el decisor, a partir de su voluntad política."], a: 1},
            {q: "113. ¿Qué significa que un precedente tenga efecto “ex nunc”?", opts: ["a. Que se aplica de manera retroactiva a casos anteriores.", "b. Que se debe obedecer desde su expedición en adelante, sin afectar situaciones pasadas.", "c. Que su aplicación depende de la voluntad del juez en cada caso.", "d. Que solo se aplica en casos excepcionales."], a: 1},
            {q: "114. ¿La vulneración del derecho a la seguridad jurídica por la inobservancia de un precedente constitucional siempre acarrea de forma automática la vulneración del derecho a la igualdad?", opts: ["a. Verdadero", "b. Falso."], a: 1},
            {q: "115. ¿Qué es una premisa normativa en el contexto de la ratio decidendi?", opts: ["a. El argumento legal del caso sin relación directa con la resolución.", "b. La regla aplicada para resolver el caso concreto, compuesta por un supuesto de hecho y una consecuencia jurídica.", "c. El argumento legal del juez que sustenta la decisión principal.", "d. El argumento sobre la importancia legal del caso sin aplicación práctica."], a: 1},
            {q: "116. ¿Los precedentes son inmutables?", opts: ["a. Sí, una vez establecidos no pueden ser modificados ni anulados.", "b. No, pueden ser revisados, modificados o dejados sin efecto por la misma Corte u órgano competente.", "c. Sí, una vez establecidos se aplican sin excepción en todos los casos futuros.", "d. No, pero solo pueden ser modificados por el Poder Legislativo."], a: 1},
            {q: "117. ¿Qué puede hacer la Corte Constitucional si determina, de forma motivada, que un caso se diferencia en una propiedad relevante respecto a otro que dio lugar a un precedente?", opts: ["a. Ignorar la diferencia y aplicar el precedente sin cambios.", "b. Introducir una excepción en la regla de precedente correspondiente.", "c. Declarar nula la regla de precedente sin más análisis.", "d. Delegar la decisión a un tribunal inferior para que tome una decisión distinta."], a: 1}
        ];

        let questions = rawBank.sort(() => Math.random() - 0.5);
        let cur = 0, score = 0, userRes = [], isValidated = false;

        function init() {
            const wrap = document.getElementById('questions-wrapper');
            questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question' + (i === 0 ? ' active' : '');
                div.id = 'q-' + i;
                let optsHtml = '';
                q.opts.forEach((o, oi) => {
                    optsHtml += `<div class="option" onclick="sel(this,${i},${oi})">${o}</div>`;
                });
                div.innerHTML = `<p style="font-weight:bold; font-size:1.15em; color:#2c3e50;">${q.q}</p>${optsHtml}`;
                wrap.appendChild(div);
            });
        }

        function sel(el, qi, oi) {
            if (isValidated) return;
            document.getElementById('q-'+qi).querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            userRes[qi] = oi;
            document.getElementById('action-btn').disabled = false;
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            if (!isValidated) {
                validateAnswer();
                isValidated = true;
                btn.innerText = (cur === questions.length - 1) ? "Ver Resultado Final" : "Pasar a la Siguiente";
            } else {
                nextQuestion();
                isValidated = false;
                btn.innerText = "Validar Respuesta";
                btn.disabled = true;
            }
        }

        function validateAnswer() {
            const q = questions[cur];
            const selectedIdx = userRes[cur];
            const options = document.getElementById('q-'+cur).querySelectorAll('.option');
            const feedback = document.getElementById('feedback-area');

            options.forEach((opt, idx) => {
                if (idx === q.a) opt.classList.add('correct');
                if (idx === selectedIdx && idx !== q.a) opt.classList.add('wrong');
            });

            if (selectedIdx === q.a) {
                score++;
                feedback.innerText = "✅ ¡Correcto!";
                feedback.style.color = "#0f5132";
            } else {
                feedback.innerText = "❌ Incorrecto";
                feedback.style.color = "#842029";
            }
        }

        function nextQuestion() {
            document.getElementById('feedback-area').innerText = "";
            document.getElementById('q-'+cur).classList.remove('active');
            cur++;
            if (cur < questions.length) {
                document.getElementById('q-'+cur).classList.add('active');
                document.getElementById('progress').innerText = `Pregunta ${cur+1} de ${questions.length}`;
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('score-display').innerText = score;
            const list = document.getElementById('full-review-list');
            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'review-card';
                let opts = '';
                const isCorrect = userRes[i] === q.a;
                
                q.opts.forEach((opt, oi) => {
                    let cls = '';
                    if (oi === q.a) cls = 'rev-correct';
                    else if (oi === userRes[i]) cls = 'rev-wrong';
                    opts += `<div class="rev-option ${cls}">${opt}</div>`;
                });

                const status = isCorrect ? '<span style="color:green;">✔ Correcto</span>' : '<span style="color:red;">✘ Incorrecto</span>';
                card.innerHTML = `<p style="font-weight:bold;">${q.q} — ${status}</p>${opts}`;
                list.appendChild(card);
            });
        }
        init();
    </script>
